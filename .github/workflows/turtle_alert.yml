# .github/workflows/turtle_alert.yml
# 저장소에 이 파일을 넣으면 매일 아침 9시(한국시간) 자동 실행됩니다

name: 터틀 전략 디스코드 알림

on:
  schedule:
    # 한국시간 09:00 = UTC 00:00 (정각은 혼잡해서 9분으로 분산)
    - cron: "9 0 * * 1-5"   # 월~금만 실행 (주말 미국 장 없음)

  # GitHub Actions 탭에서 수동 실행도 가능
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # positions.json을 저장소에 커밋하기 위해 필요

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install yfinance requests pandas numpy

      - name: 터틀 봇 실행
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python turtle_bot.py

      # 포지션 상태(positions.json)를 저장소에 커밋 — 다음 실행에서 기억하도록
      - name: 포지션 상태 저장
        run: |
          git config user.name "turtle-bot"
          git config user.email "bot@noreply.github.com"
          git add positions.json
          git diff --staged --quiet || git commit -m "포지션 상태 업데이트 $(date +%Y-%m-%d)"
          git push
